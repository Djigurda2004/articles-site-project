{% extends 'main/sidebar.html' %}
{%load static%}
{%block title%}Article form{%endblock%}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'articles/css/articles.css' %}">
{%endblock%}
{% block content %}
    <div class="article-create">
        <h1>Article form</h1>
        <form method="post" class="create-form">
            {% csrf_token %}
            {{form.title}}
            {{form.announcement}}
            {{form.full_text}}
            <span>{{error}}</span>
            <button class="btn btn-success" type="submit">Save</button>
        </form>
    </div>
{% endblock %}
