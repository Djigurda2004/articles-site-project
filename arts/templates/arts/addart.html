{% extends 'main/more.html' %}
{%block title%}Article form{%endblock%}
{% block content %}
    <div class="features">
        <h1>Article form</h1>
        <form method="post" class="create-form">
            {% csrf_token %}
            {{form.title}}<br>
            {{form.anons}}<br>
            {{form.full_text}}<br>
            <span>{{error}}</span>
            <button class="btn btn-success" type="submit">Save</button>
        </form>
    </div>
{% endblock %}
