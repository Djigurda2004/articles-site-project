<span id="like-area-{{ node.id }}">
    <button class="icon-btn" 
            hx-post="{% url 'comments:like' node.id %}" 
            hx-target="#like-area-{{ node.id }}" 
            hx-swap="outerHTML"
            style="{% if request.user in node.likes.all %}color: #ff4757;{% else %}color: gray;{% endif %}"
            title="Like">
        <i class="fa-solid fa-heart"></i> <span style="font-size: 0.9em; color: gray;">{{ node.likes.count }}</span>
    </button>
</span>
