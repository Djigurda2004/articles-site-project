<span id="follow-area-{{ profile.user.username }}">
    {% if request.user in profile.followers.all %}
        <button class="btn btn-danger btn-follow"
                hx-post="{% url 'users:follow' profile.user.username %}" 
                hx-target="#follow-area-{{ profile.user.username }}" 
                hx-swap="outerHTML">
            Unfollow
        </button>
    {% else %}
        <button class="btn btn-success btn-follow"
                hx-post="{% url 'users:follow' profile.user.username %}" 
                hx-target="#follow-area-{{ profile.user.username }}" 
                hx-swap="outerHTML">
            Follow
        </button>
    {% endif %}
</span>
