<div class="user-badge">
    {% if account.profile.avatar %}
        <img src="{{ account.profile.avatar.url }}" class="avatar avatar-sm" alt="{{ account.username }}">
    {% else %}
        <div class="empty-avatar empty-avatar-sm">
            <span>{{ account.username|make_list|first|upper }}</span>
        </div>
    {% endif %}
    <a href="{% url 'users:profile' account.username %}">{{ account.username }}</a>
</div>
